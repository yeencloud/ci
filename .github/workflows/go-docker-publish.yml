name: "Go Test, Lint, and Docker Publish"

on:
  workflow_call:
    secrets:
      ACCESS_TOKEN:
        required: true

jobs:
  test-and-lint:
    name: Test and Lint
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@v3
        with:
          persist-credentials: false

      - name: Lowercase org name
        id: org_lowercase
        uses: ASzc/change-string-case-action@v6.0
        with:
          input: ${{ github.repository_owner }}
          transform: toLowerCase

      - name: Authenticate Git for private modules
        run: |
          echo "Configuring git for private modules..."
          git config --global url."https://${{ secrets.ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"
          ORG_NAME_LOWER="${{ steps.org_lowercase.outputs.value }}"
          go env -w GOPRIVATE=github.com/$ORG_NAME_LOWER/*

      - name: Set up Go (latest 1.x)
        uses: actions/setup-go@v3
        with:
          go-version: "1.x"

      - name: Lint and Test
        uses: AliceDiNunno/action-go-test-and-lint@v0.3.0

  build-and-publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    needs: [ test-and-lint ]
    permissions:
      contents: read
      packages: write  # needed to push Docker images to GHCR

    steps:
      - name: Check out code
        uses: actions/checkout@v3
        with:
          persist-credentials: false

      - name: Lowercase org name
        id: org_lowercase
        uses: ASzc/change-string-case-action@v6.0
        with:
          input: ${{ github.repository_owner }}
          transform: toLowerCase

      - name: Lowercase repo name
        id: repo_lowercase
        uses: ASzc/change-string-case-action@v6.0
        with:
          input: ${{ github.event.repository.name }}
          transform: toLowerCase

      - name: Authenticate Git for private modules
        run: |
          echo "Configuring git for private modules..."
          git config --global url."https://${{ secrets.ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"
          ORG_NAME_LOWER="${{ steps.org_lowercase.outputs.value }}"
          go env -w GOPRIVATE=github.com/$ORG_NAME_LOWER/*

      - name: Set up Go (latest 1.x)
        uses: actions/setup-go@v3
        with:
          go-version: "1.x"

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.ACCESS_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Set up QEMU (for cross-building)
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push multi-arch Docker image
        run: |
          ORG_NAME_LOWER="${{ steps.org_lowercase.outputs.value }}"
          REPO_NAME_LOWER="${{ steps.repo_lowercase.outputs.value }}"

          docker buildx build \
            --platform linux/amd64,linux/arm/v7 \
            -t ghcr.io/${ORG_NAME_LOWER}/${REPO_NAME_LOWER}:latest \
            --push .
